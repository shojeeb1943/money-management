services:
    moneta:
        image: ghcr.io/revoltify/moneta:latest
        # build:                        # uncomment to build locally instead of pulling
        #     context: .
        #     dockerfile: docker/Dockerfile
        ports:
            - '8080:8080'
        environment:
            APP_URL: http://localhost:8080
            # APP_KEY: base64:...            # optional — auto-generated and persisted in the storage volume
            # MONETA_ADMIN_NAME: Admin       # first-boot admin (defaults: admin@admin.com / 12345678 / Demo Company)
            # MONETA_ADMIN_EMAIL: admin@admin.com
            # MONETA_ADMIN_PASSWORD: change-me-now
            # MONETA_COMPANY: My Company
            # DB_CONNECTION: mysql           # switch off SQLite if you add a database service
        volumes:
            - moneta-storage:/app/storage
        restart: unless-stopped

volumes:
    moneta-storage:
