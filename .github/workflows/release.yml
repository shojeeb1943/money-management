name: release

on:
    push:
        tags: ['*']

permissions:
    contents: write

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
              with:
                  persist-credentials: false

            - name: Setup PHP
              uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2
              with:
                  php-version: '8.3'
                  tools: composer:v2
                  coverage: none

            - name: Setup Node
              uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
              with:
                  node-version: '22'

            - name: Install Dependencies
              run: composer install --no-interaction --prefer-dist --optimize-autoloader

            - name: Prepare Build Environment
              run: cp .env.example .env && php artisan key:generate

            - name: Install Node Dependencies
              run: npm ci

            - name: Build Assets
              run: npm run build

            - name: Prune Dev Dependencies
              run: composer install --no-dev --no-interaction --prefer-dist --optimize-autoloader

            - name: Clean Build Artifacts
              run: php artisan optimize:clear && rm -f .env

            - name: Assemble Release Zip
              run: |
                  mkdir -p dist/moneta
                  rsync -a --exclude-from=.github/release-excludes.txt ./ dist/moneta/
                  cd dist && zip -rq "moneta-${GITHUB_REF_NAME}.zip" moneta

            - name: Publish Release
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  gh release create "$GITHUB_REF_NAME" --generate-notes dist/moneta-*.zip \
                      || gh release upload "$GITHUB_REF_NAME" dist/moneta-*.zip --clobber
